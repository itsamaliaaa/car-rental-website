<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rental Mobil</title>
    <link rel="stylesheet" href="../css/nav-adm.css" />
    <link rel="stylesheet" href="../css/admin/detail-booking.css" />
</head>

<body>
    <!-- sidebar -->
    <div class="sidebar-admin">
        <div class="sidebar-container">
            <a href="dashboard.html" class="menu-item">
                <img src="../assets/icon/dashboard.svg" alt="Icon" class="menu-icon">
                <p>Dashboard</p>
            </a>

            <a href="mobil.html" class="menu-item">
                <img src="../assets/icon/mobil.svg" alt="Icon" class="menu-icon">
                <p>Manajemen Mobil</p>
            </a>

            <a href="booking.html" class="menu-item active">
                <img src="../assets/icon/elements.svg" alt="Icon" class="menu-icon">
                <p>Manajemen Booking</p>
            </a>

            <a href="review.html" class="menu-item">
                <img src="../assets/icon/review.svg" alt="Icon" class="menu-icon">
                <p>Moderasi Review</p>
            </a>
        </div>

        <div class="footer-sidebar">
            <div class="line"></div>
            <a href="login.html" class="menu-item">
                <img src="../assets/icon/logout-04.svg" alt="Icon" class="menu-icon">
                <p style="color: #cd2f4b;">Logout</p>
            </a>
        </div>
    </div>

    <!-- navbar -->
    <nav class="navbar-admin">
        <img src="../assets/images/logo.svg" alt="Aflah Jaya Rental">

        <div class="profile-admin">
            <p>Admin</p>
            <img src="../assets/images/Rectangle 1.png" alt="Profile" class="foto-admin">
        </div>
    </nav>

    <!-- lihat detail -->
    <div class="lihat-detail">
        <div class="lihat-detail-card">
            <h1 class="judul">Detail Booking</h1>

            <div class="detail-container">
                <div class="left-column">
                    <div class="input">
                        <label>Nama</label>
                        <div class="info">Budi Setiawan</div>
                    </div>
                    <div class="input">
                        <label>Email</label>
                        <div class="info">budi_setiawan@gmail.com</div>
                    </div>
                    <div class="input">
                        <label>Nomor Telephone</label>
                        <div class="info">08123456789</div>
                    </div>
                    <div class="input">
                        <label>Tipe Unit</label>
                        <div class="info">Toyota Avanza 2023</div>
                    </div>
                    <div class="input">
                        <label>Harga</label>
                        <div class="info">Rp. 500k/hari</div>
                    </div>
                    <div class="input">
                        <label style="color: #545454;">Status</label>
                        <div class="select-container">
                            <select class="select-custom">
                                <option value="success">Success</option>
                                <option value="confirmed">Confirmed</option>
                                <option value="pending">Pending</option>
                            </select>
                            <img src="../assets/icon/Vector.svg" class="ikon-select-custom" alt="icon">
                        </div>
                    </div>
                </div>

                <div class="right-column">
                    <div class="gambar">Image</div>
                    <button class="download">Download Bukti</button>
                    <div class="input">
                        <label>Catatan</label>
                        <div class="info catatan">Ke Bandara</div>
                    </div>
                    <div class="input">
                        <label>Kode Booking</label>
                        <div class="info kode-booking">AJ-20260403-001</div>
                    </div>
                </div>
            </div>

            <a href="#konfirmasi-overlay" class="konfirmasi">Konfirmasi</a>
        </div>
    </div>

    <div id="konfirmasi-overlay" class="background-overlay">
        <div class="card-overlay">
            <h2>Apakah Kamu Yakin Ingin Melakukan Konfirmasi ?</h2>
            <div class="tombol-container">
                <a href="booking.html" class="ya">Ya</a>
                <a href="#" class="tidak">Tidak</a>
            </div>
        </div>
    </div>

</body>

</html>
